<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <title>Hello, world!</title>
  </head>
  <body>
    <h1>Hello, world!</h1>
    <form name="web-app-sembada" class="row g-2 ms-2">
      <div class="container-satu">
        <div class="col-md-5">
          <label for="inputAddress" class="form-label">Nama</label>
          <input type="text" class="form-control" id="inputAddress" placeholder="Nama Lengkap" name="nama">
        </div>
        <div class="col-md-2">
            <label for="inputState" class="form-label">Jenis Kelamin</label>
            <select id="inputState" class="form-select" name="jeniskelamin">
                <option selected>Laki-laki</option>
                <option>Perempuan</option>
            </select>
        </div>
        <div class="col-md-2">
          <label for="inputPassword4" class="form-label">Rekam Medis</label>
          <input type="text" class="form-control" id="inputPassword4" name="rekammedis">
        </div>
        <div class="col-md-4">
          <label for="inputEmail4" class="form-label">Email</label>
          <input type="email" class="form-control" id="inputEmail4" name="email">
        </div>
        <div class="col-md-9">
          <label for="inputAddress2" class="form-label">Alamat</label>
          <input type="text" class="form-control" id="inputAddress2" placeholder="Alamat Lengkap" name="alamat">
        </div>
        <div class="col-md-2">
          <label for="inputZip" class="form-label">Kode Pos</label>
          <input type="text" class="form-control" id="inputZip" name="kodepos">
        </div>
        <div class="col-md-3">
          <label for="inputCity" class="form-label">No. Handphone</label>
          <input type="integer" class="form-control" id="inputCity" name="nohandphone">
        </div>
        <!-- <div class="col-12">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="gridCheck">
            <label class="form-check-label" for="gridCheck">
              Check me out
            </label>
          </div> -->
        </div>
        <div class="kolom-utama">
          </div>
          <div class="sidebar-satu">
            <textarea name="" id="" cols="90" rows="3" placeholder="keterangan tambahan"></textarea>
          </div>
          <div class="sidebar-dua">
            <div class="col-15">
              <button type="submit" class="btn btn-primary">Kirim</button>
            </div>
          </div>
          
          
        </div>
      </form>

    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script>
      const scriptURL = 'https://script.google.com/macros/s/AKfycbxty30jfbYkbi6gqimVDj3gjytzM_DW1lNmL9p-y-v65GKjUuydlkKwP5JzrO3j9ooX/exec'
      const form = document.forms['web-app-sembada']
    
      form.addEventListener('submit', e => {
        e.preventDefault()
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
          .then(response => console.log('Success!', response))
          .catch(error => console.error('Error!', error.message))
      })
    </script>

    <!-- Option 2: Separate Popper and Bootstrap JS -->
    <!--
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    -->
  </body>
</html>
